<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gates - EAC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00527a;
            --primary-dark: #003d5c;
            --primary-light: #007ba8;
            --accent: #00a3d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            --dark-bg: #0f172a;
            --dark-surface: #1a2849;
            --dark-surface-alt: #233458;
            --dark-border: #334155;
            --dark-text: #f1f5f9;
            --dark-text-muted: #cbd5e1;
            
            --light-bg: #f8fafc;
            --light-surface: #ffffff;
            --light-surface-alt: #f1f5f9;
            --light-border: #e2e8f0;
            --light-text: #0f172a;
            --light-text-muted: #64748b;
        }

        html.light-mode {
            --bg: var(--light-bg);
            --surface: var(--light-surface);
            --surface-alt: var(--light-surface-alt);
            --border: var(--light-border);
            --text: var(--light-text);
            --text-muted: var(--light-text-muted);
        }

        html:not(.light-mode) {
            --bg: var(--dark-bg);
            --surface: var(--dark-surface);
            --surface-alt: var(--dark-surface-alt);
            --border: var(--dark-border);
            --text: var(--dark-text);
            --text-muted: var(--dark-text-muted);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #00527a 0%, #007ba8 100%);
            border-bottom: 2px solid #007ba8;
            backdrop-filter: blur(12px);
            padding: 1.5rem 2rem;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo::before {
            content: '⚡ ';
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--surface-alt);
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .guide-btn {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: 1.5px solid var(--primary);
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .guide-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 105, 92, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero-content {
            display: block;
        }

        .hero-text h1 {
            font-size: clamp(2.2rem, 5vw, 3rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
        }

        .hero-text p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            max-width: 600px;
        }

        .stat-item {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-color: var(--primary);
            background: var(--surface);
            transform: translateY(-4px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .hero-visual {
            display: none;
        }

        /* Filters */
        .filters-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .filters-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
        }

        .filters-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .filters-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 2rem;
            align-items: center;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.8rem;
            white-space: nowrap;
        }

        .filter-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
            min-width: fit-content;
        }

        .year-buttons {
            display: flex;
            gap: 0.4rem;
            flex-wrap: nowrap;
        }

        .btn-filter {
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-filter:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-filter.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .project-select {
            padding: 0.5rem 0.8rem;
            border: 1.5px solid var(--border);
            background: var(--surface-alt);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
            min-width: 200px;
        }

        .project-select:hover {
            border-color: var(--primary);
        }

        .project-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .project-select option {
            background: var(--surface);
            color: var(--text);
        }

        /* Gates Filters */
        .gates-filters {
            display: flex;
            gap: 0.6rem;
            flex-wrap: nowrap;
        }

        .gate-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1.5px solid transparent;
            background: var(--surface-alt);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .gate-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .gate-badge.gate1 .dot { background: #3b82f6; }
        .gate-badge.gate2 .dot { background: #8b5cf6; }
        .gate-badge.gate3 .dot { background: #ec4899; }
        .gate-badge.gate4 .dot { background: #f59e0b; }

        .gate-badge:hover {
            transform: translateY(-2px);
        }

        .gate-badge.active {
            border-color: currentColor;
        }

        .gate-badge.gate1.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.15); }
        .gate-badge.gate2.active { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.15); }
        .gate-badge.gate3.active { border-color: #ec4899; background: rgba(236, 72, 153, 0.15); }
        .gate-badge.gate4.active { border-color: #f59e0b; background: rgba(245, 158, 11, 0.15); }

        /* Timeline */
        .timeline {
            margin-bottom: 4rem;
        }

        .timeline-month {
            margin-bottom: 3rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .month-header {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }

        .gates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .gate-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            animation: cardEntry 0.5s ease-out;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gate-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(0, 102, 255, 0.15);
        }

        .gate-card.completed {
            border-color: var(--success);
        }

        .gate-card.completed:hover {
            box-shadow: 0 16px 40px rgba(16, 185, 129, 0.15);
        }

        .gate-card-header {
            background: linear-gradient(135deg, var(--surface-alt), var(--surface));
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .gate-info {
            flex: 1;
        }

        .gate-badge-large {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
            color: white;
        }

        .gate-badge-large.gate1 { background: #3b82f6; }
        .gate-badge-large.gate2 { background: #8b5cf6; }
        .gate-badge-large.gate3 { background: #ec4899; }
        .gate-badge-large.gate4 { background: #f59e0b; }

        .gate-card.completed .gate-badge-large {
            background: var(--success);
        }

        .gate-date {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .gate-card.completed .gate-date {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .gate-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
            margin: 0;
            flex-shrink: 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }

        .checkbox-label:hover {
            color: var(--primary);
        }

        .pacote-badge {
            padding: 0.4rem 0.8rem;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .gate-card-body {
            padding: 1.5rem;
        }

        .gate-project {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 0.8rem;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        .gate-card.completed .gate-project {
            opacity: 0.6;
        }

        .gate-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Stats Footer */
        .stats-footer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 4rem;
        }

        .footer-stat {
            text-align: center;
        }

        .footer-stat-num {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .footer-stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .no-events {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .no-events-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-content {
                grid-template-columns: 1fr;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .gates-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .hero {
                margin-bottom: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .hero-visual {
                grid-template-columns: 1fr;
            }

            .gates-grid {
                grid-template-columns: 1fr;
            }

            .filters-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .gates-filters {
                grid-column: 1 / -1;
            }

            .stats-footer {
                grid-template-columns: 1fr;
            }
        }

        /* Footer */
        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 3rem;
        }

        .footer-credits {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .footer-credits strong {
            color: var(--primary);
            font-weight: 600;
        }

        .footer-badge {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">Painel de Gates - EAC</div>
            <div class="header-actions">
                <button class="guide-btn" onclick="openGuide()" title="Guia Rápido - Norma de Gates">📖 GUIA RÁPIDO</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-text">
                <h1>Painel de Gates - EAC</h1>
                <p>Acompanhe o progresso de 12 projetos de infraestrutura da Energisa Acre com status em tempo real.</p>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="totalStat">56</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="completedStat">0</div>
                        <div class="stat-label">Realizadas</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="pendingStat">56</div>
                        <div class="stat-label">Pendentes</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Filters -->
        <section class="filters-section">
            <div class="filters-title">🔍 Filtros</div>
            <div class="filters-grid">
                <!-- Primeira linha: Ano e Projeto -->
                <div class="filters-row">
                    <div class="filter-group">
                        <label class="filter-label">Ano</label>
                        <div class="year-buttons">
                            <button class="btn-filter active" onclick="filterByYear('all')">Todos</button>
                            <button class="btn-filter" onclick="filterByYear('2025')">2025</button>
                            <button class="btn-filter" onclick="filterByYear('2026')">2026</button>
                            <button class="btn-filter" onclick="filterByYear('2027')">2027</button>
                            <button class="btn-filter" onclick="filterByYear('2028')">2028</button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Projeto</label>
                        <select class="project-select" id="projectSelect" onchange="filterByProject(this.value)">
                            <option value="">Todos os Projetos</option>
                        </select>
                    </div>
                </div>

                <!-- Segunda linha: Gates e Pacote -->
                <div class="filters-row">
                    <div class="filter-group">
                        <label class="filter-label">Gates</label>
                        <div class="gates-filters">
                            <div class="gate-badge gate1 active" onclick="toggleGateFilter(1)">
                                <div class="dot"></div>
                                Gate 1
                            </div>
                            <div class="gate-badge gate2 active" onclick="toggleGateFilter(2)">
                                <div class="dot"></div>
                                Gate 2
                            </div>
                            <div class="gate-badge gate3 active" onclick="toggleGateFilter(3)">
                                <div class="dot"></div>
                                Gate 3
                            </div>
                            <div class="gate-badge gate4 active" onclick="toggleGateFilter(4)">
                                <div class="dot"></div>
                                Gate 4
                            </div>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Pacote</label>
                        <div class="year-buttons">
                            <button class="btn-filter active" onclick="filterByPacote('all')">Todos</button>
                            <button class="btn-filter" onclick="filterByPacote('SE')">SE</button>
                            <button class="btn-filter" onclick="filterByPacote('LDAT')">LDAT</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Timeline -->
        <section class="timeline" id="timeline"></section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-credits">
            <span>Desenvolvido por</span>
            <strong>Rogério Ferraz das Chagas</strong>
            <span class="footer-badge">PMO-EAC</span>
        </div>
    </footer>

    <script>
        const monthNames = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 
                           'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];

            { date: "09/02/2027", project: "53158-NOVO_ALIMENTADOR_SGS-01C3_-_13_8KV_-_TAQUARI", gate: 2 },
            { date: "26/08/2027", project: "53158-NOVO_ALIMENTADOR_SGS-01C3_-_13_8KV_-_TAQUARI", gate: 3 },

            { date: "17/02/2026", project: "53159-AMPLIAÇÃO_SED_SENA_MADUREIRA", gate: 1 },
            { date: "22/05/2026", project: "53159-AMPLIAÇÃO_SED_SENA_MADUREIRA", gate: 2 },
            { date: "27/10/2026", project: "53159-AMPLIAÇÃO_SED_SENA_MADUREIRA", gate: 3 },
            { date: "16/04/2027", project: "53159-AMPLIAÇÃO_SED_SENA_MADUREIRA", gate: 4 },

            { date: "10/10/2028", project: "83701-RETROFIT_BANCO_DE_CAPACITOR_-_SE_TAQUARI", gate: 3 },
            { date: "29/12/2028", project: "83701-RETROFIT_BANCO_DE_CAPACITOR_-_SE_TAQUARI", gate: 4 }
        ];

        let currentYearFilter = 'all';
        let currentProjectFilter = '';
        let currentPacoteFilter = 'all';
        let activeGates = new Set([1, 2, 3, 4]);
        let completedEvents = {};

        function loadCompleted() {
            const saved = localStorage.getItem('completedEvents');
            if (saved) completedEvents = JSON.parse(saved);
        }

        function saveCompleted() {
            localStorage.setItem('completedEvents', JSON.stringify(completedEvents));
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-mode');
            const btn = document.getElementById('themeBtn');
            if (btn) {
                btn.textContent = html.classList.contains('light-mode') ? '☀️' : '🌙';
            }
            localStorage.setItem('theme', html.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function openGuide() {
            window.open('https://pmoeac.github.io/Norma-de-Gates/', '_blank');
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            // Padrão é claro (light-mode)
            if (saved === 'dark') {
                document.documentElement.classList.remove('light-mode');
                const btn = document.getElementById('themeBtn');
                if (btn) {
                    btn.textContent = '🌙';
                }
            } else {
                // Claro é o padrão
                document.documentElement.classList.add('light-mode');
                const btn = document.getElementById('themeBtn');
                if (btn) {
                    btn.textContent = '☀️';
                }
            }
        }

        function getEventKey(date, gate, project) {
            return `${date}-${gate}-${project}`;
        }

        function formatProjectName(project) {
            // Mapeamento exato de projetos
            const projectNames = {
                '31096-REFPRMA_DA_SED_ELEVADORA_SMD-09S1': '31096-Reforma SE Elevadora SMD-09S1',
                '53158-NOVO_ALIMENTADOR_SGS-01C3_-_13_8KV_-_TAQUARI': '53158-Construção de Bay - Novo Alimentador 13,8kV SGS-01C3',
                '53159-AMPLIAÇÃO_SED_SENA_MADUREIRA': '53159-Ampliação SE Sena Madureira',
                '61652-NOVA_SEDE_PORTO_ACRE_-_34_5-13_8KV_-_7_5MVA': '61652-Nova SE Porto Acre',
                '61653-ADEQUAÇÃO_SED_ALTO_ALEGRE-SED_PORTO_ACRE-69-34_5KV-15MVA': '61653-Adequação da SE Alto Alegre para atendimento a SE Porto Acre',
                '62012-AMPLIAÇÃO_SED_PLÁCIDO_DE_CASTRO_34_5_KV': '62012-Ampliação SE Plácido de Castro',
                '74461-RETROFIT_BANCO_DE_CAPACITOR-SE_SÃO_FRANCISCO': '74461-Retrofit Banco de Capacitor - SE São Francisco',
                '78681-REFORMA_DA_SED_ELEVADORA_SANTA_LUZIA_-_SLU-09S1': '78681-Reforma SE Elev. Santa Luzia',
                '83448-LIMITE_DE_CAPACIDADE_-_JURUA-01C9': '83448-Construção de Bay - Novo Alimentador JUR-01I2 (JUR-01C9)',
                '83486-NOVA_BRASILÉIA_138-69KV_-_138-13_8KV': '83486-Nova SE Brasiléia 138-69kV - 138-13,8kV',
                '83698-RETROFIT_BANCO_DE_CAPACITOR_-_SE_TANGARÁ': '83698-Retrofit Banco de Capacitor - SE Tangará',
                '83701-RETROFIT_BANCO_DE_CAPACITOR_-_SE_TAQUARI': '83701-Retrofit Banco de Capacitor - SE Taquari'
            };

            // Retornar o nome mapeado ou o original se não existir
            return projectNames[project] || project;
        }

        function toggleGateFilter(gate) {
            if (activeGates.has(gate)) {
                activeGates.delete(gate);
            } else {
                activeGates.add(gate);
            }

            document.querySelectorAll(`.gate-badge.gate${gate}`).forEach(el => {
                el.classList.toggle('active');
            });

            render();
        }

        function initProjectSelect() {
            const select = document.getElementById('projectSelect');
            const projects = [...new Set(eventsData.map(e => e.project))].sort();
            projects.forEach(project => {
                const option = document.createElement('option');
                option.value = project;
                option.textContent = formatProjectName(project);
                select.appendChild(option);
            });
        }

        function render() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            const eventsByMonth = {};
            
            eventsData.forEach(event => {
                const [day, month, year] = event.date.split('/');
                
                if (currentYearFilter !== 'all' && year !== currentYearFilter) return;
                if (currentProjectFilter && event.project !== currentProjectFilter) return;
                if (!activeGates.has(event.gate)) return;
                
                // Filtro de pacote (SE/LDAT)
                if (currentPacoteFilter !== 'all') {
                    let pacote = 'SE';
                    const projectLower = event.project.toLowerCase();
                    if (projectLower.includes('ldat') || projectLower.includes('-l')) {
                        pacote = 'LDAT';
                    }
                    if (pacote !== currentPacoteFilter) return;
                }
                
                const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                const monthKey = date.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                
                if (!eventsByMonth[monthKey]) eventsByMonth[monthKey] = [];
                eventsByMonth[monthKey].push(event);
            });

            if (Object.keys(eventsByMonth).length === 0) {
                timeline.innerHTML = '<div class="no-events"><div class="no-events-icon">📭</div><p>Nenhum evento encontrado</p></div>';
                updateStats();
                return;
            }

            const sortedMonths = Object.keys(eventsByMonth).sort((a, b) => {
                const [monthA, yearA] = a.split(' de ');
                const [monthB, yearB] = b.split(' de ');
                const dateA = new Date(parseInt(yearA), monthNames.indexOf(monthA), 1);
                const dateB = new Date(parseInt(yearB), monthNames.indexOf(monthB), 1);
                return dateA - dateB;
            });

            sortedMonths.forEach(month => {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'timeline-month';
                
                const header = document.createElement('div');
                header.className = 'month-header';
                header.textContent = month.charAt(0).toUpperCase() + month.slice(1);
                monthDiv.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'gates-grid';

                eventsByMonth[month].forEach(event => {
                    const eventKey = getEventKey(event.date, event.gate, event.project);
                    const isCompleted = completedEvents[eventKey];

                    const card = document.createElement('div');
                    card.className = `gate-card ${isCompleted ? 'completed' : ''}`;
                    
                    const cardHeader = document.createElement('div');
                    cardHeader.className = 'gate-card-header';
                    
                    const gateInfo = document.createElement('div');
                    gateInfo.className = 'gate-info';
                    
                    const badge = document.createElement('div');
                    badge.className = `gate-badge-large gate${event.gate}`;
                    badge.textContent = `GATE ${event.gate}`;
                    
                    const date = document.createElement('div');
                    date.className = 'gate-date';
                    date.textContent = event.date;
                    
                    gateInfo.appendChild(badge);
                    gateInfo.appendChild(date);
                    
                    // Extrair pacote (SE/LDAT) do nome do projeto
                    let pacote = 'SE';
                    if (event.project.includes('-SE') || event.project.includes('-LDAT')) {
                        if (event.project.includes('-LDAT')) {
                            pacote = 'LDAT';
                        } else {
                            pacote = 'SE';
                        }
                    }
                    
                    const pacoteBadge = document.createElement('div');
                    pacoteBadge.className = 'pacote-badge';
                    pacoteBadge.textContent = pacote;
                    
                    cardHeader.appendChild(gateInfo);
                    cardHeader.appendChild(pacoteBadge);
                    card.appendChild(cardHeader);
                    
                    const body = document.createElement('div');
                    body.className = 'gate-card-body';
                    
                    const project = document.createElement('div');
                    project.className = 'gate-project';
                    project.textContent = formatProjectName(event.project);
                    project.title = event.project;
                    
                    body.appendChild(project);
                    
                    // Checkbox na parte de baixo
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'gate-checkbox';
                    checkbox.id = 'cb-' + getEventKey(event.date, event.gate, event.project).replace(/[|]/g, '-');
                    checkbox.checked = isCompleted;
                    checkbox.onchange = () => {
                        if (completedEvents[eventKey]) {
                            delete completedEvents[eventKey];
                            card.classList.remove('completed');
                        } else {
                            completedEvents[eventKey] = true;
                            card.classList.add('completed');
                        }
                        saveCompleted();
                        updateStats();
                    };
                    
                    const checkboxLabel = document.createElement('label');
                    checkboxLabel.className = 'checkbox-label';
                    checkboxLabel.htmlFor = checkbox.id;
                    checkboxLabel.appendChild(checkbox);
                    checkboxLabel.appendChild(document.createTextNode('Realizado'));
                    
                    body.appendChild(checkboxLabel);
                    card.appendChild(body);
                    
                    grid.appendChild(card);
                });

                monthDiv.appendChild(grid);
                timeline.appendChild(monthDiv);
            });

            updateStats();
        }

        function updateStats() {
            const total = document.querySelectorAll('.gate-card').length;
            const completed = document.querySelectorAll('.gate-card.completed').length;
            const pending = total - completed;
            const months = document.querySelectorAll('.timeline-month').length;
            const avg = months > 0 ? (total / months).toFixed(1) : '0';

            const totalEl = document.getElementById('totalStat');
            if (totalEl) totalEl.textContent = total;
            
            const completedEl = document.getElementById('completedStat');
            if (completedEl) completedEl.textContent = completed;
            
            const pendingEl = document.getElementById('pendingStat');
            if (pendingEl) pendingEl.textContent = pending;
            
            const avgEl = document.getElementById('avgStat');
            if (avgEl) avgEl.textContent = avg;
        }

        function filterByYear(year) {
            currentYearFilter = year;
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function filterByProject(project) {
            currentProjectFilter = project;
            render();
        }

        function filterByPacote(pacote) {
            currentPacoteFilter = pacote;
            
            // Encontrar o grupo de pacote e atualizar botões
            const filterGroups = document.querySelectorAll('.filter-group');
            filterGroups.forEach(group => {
                const label = group.querySelector('.filter-label');
                if (label && label.textContent.includes('Pacote')) {
                    const buttons = group.querySelectorAll('.btn-filter');
                    buttons.forEach(btn => btn.classList.remove('active'));
                    
                    buttons.forEach(btn => {
                        const btnText = btn.textContent.trim();
                        if ((pacote === 'all' && btnText === 'Todos') ||
                            (pacote !== 'all' && btnText === pacote)) {
                            btn.classList.add('active');
                        }
                    });
                }
            });
            
            render();
        }

        // Inicializar
        initTheme();
        initProjectSelect();
        loadCompleted();
        render();
    </script>

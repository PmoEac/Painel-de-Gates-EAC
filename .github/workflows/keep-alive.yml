name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 * * *'   # Todo dia às 08h UTC (05h Brasília)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert no banco para manter ativo
        run: |
          curl -s \
            -o /dev/null \
            -w "Status: %{http_code}\n" \
            -X POST \
            "https://rjmvfyozgeiylncjilke.supabase.co/rest/v1/keep_alive_log" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pinged_at": "now()"}'
